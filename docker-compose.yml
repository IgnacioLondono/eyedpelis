# Eyedpelis — Stack completo (app + descargas + indexadores)
# Portainer: deploy desde Git, compose path: docker-compose.yml
#
# Servicios incluidos:
#   eyedpelis     → https://eyedmovies.eyedcomun.me (puerto 3001)
#   qbittorrent   → Web UI puerto host ${QBIT_HOST_PORT:-18787}
#   prowlarr      → Web UI puerto host ${PROWLARR_HOST_PORT:-19696}
#   jackett       → Web UI puerto host ${JACKETT_HOST_PORT:-19117}
#   flaresolverr  → puerto host ${FLARESOLVERR_HOST_PORT:-18191}
#
# Puertos internos (entre contenedores) no cambian: prowlarr:9696, jackett:9117, etc.
# Los puertos HOST usan 1xxxx para no chocar con Prowlarr/Jackett del stack jellyfinn.
#
# Tras el primer arranque:
#   1. Prowlarr → Settings → General → copia API Key → PROWLARR_API_KEY en Portainer
#   2. Jackett  → copia API Key de la portada → JACKETT_API_KEY en Portainer
#   3. Prowlarr → Indexers → Add indexer (1337x, Nyaa, etc.)
#   4. Prowlarr → Settings → FlareSolverr URL: http://flaresolverr:8191
#   5. qBittorrent → Options → Downloads → guardar en /downloads
#   6. Redeploy del stack tras poner las API keys

services:
  eyedpelis:
    build: .
    container_name: eyedpelis
    restart: unless-stopped
    depends_on:
      qbittorrent-config:
        condition: service_completed_successfully
      qbittorrent:
        condition: service_started
      prowlarr:
        condition: service_started
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MEDIA_PATH=/media
      - MOVIES_PATH=Peliculas
      - SERIES_PATH=Series
      - MEDIA_READ_ONLY=false
      - TMDB_API_KEY=${TMDB_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-cambia-este-secreto-en-produccion}
      - ADMIN_USER=${ADMIN_USER:-eyedpelis}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-Eyedpelis2026!}
      - AUTH_ENABLED=${AUTH_ENABLED:-true}
      - CLIENT_URL=${CLIENT_URL:-https://eyedmovies.eyedcomun.me}
      - QBITTORRENT_URL=http://qbittorrent:8080
      - QBITTORRENT_USER=${QBITTORRENT_USER:-admin}
      - QBITTORRENT_PASS=${QBITTORRENT_PASS:-adminadmin}
      - PROWLARR_URL=http://prowlarr:9696
      - PROWLARR_API_KEY=${PROWLARR_API_KEY:-}
      - JACKETT_URL=http://jackett:9117
      - JACKETT_API_KEY=${JACKETT_API_KEY:-}
      - JELLYFIN_URL=${JELLYFIN_URL:-}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY:-}
      - FLARESOLVERR_URL=http://flaresolverr:8191
      - PUBLIC_HOST=${PUBLIC_HOST:-192.168.50.197}
      - QBIT_HOST_PORT=${QBIT_HOST_PORT:-18787}
      - PROWLARR_HOST_PORT=${PROWLARR_HOST_PORT:-19696}
      - JACKETT_HOST_PORT=${JACKETT_HOST_PORT:-19117}
      - FLARESOLVERR_HOST_PORT=${FLARESOLVERR_HOST_PORT:-18191}
    volumes:
      - ${MEDIA_PATH:-/srv/dev-disk-by-uuid-a5b4e34c-5e9b-430c-93ad-0473fe6143d2/data/Videos}:/media
      - ${DOWNLOADS_PATH:-/srv/dev-disk-by-uuid-a5b4e34c-5e9b-430c-93ad-0473fe6143d2/data/Downloads}:/downloads
      - ./data:/app/server/data
      - ./data/prowlarr:/integration/prowlarr:ro
      - ./data/jackett:/integration/jackett:ro
    networks:
      - eyedpelis-net

  qbittorrent-config:
    image: alpine:3.20
    container_name: eyedpelis-qbit-config
    restart: "no"
    volumes:
      - ./data/qbittorrent:/config
      - ./docker/qbittorrent-init.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "/init.sh"]
    networks:
      - eyedpelis-net

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: eyedpelis-qbittorrent
    restart: unless-stopped
    depends_on:
      qbittorrent-config:
        condition: service_completed_successfully
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Madrid}
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    ports:
      - "${QBIT_HOST_PORT:-18787}:8080"
      - "${QBIT_TORRENT_PORT:-16881}:6881"
      - "${QBIT_TORRENT_PORT:-16881}:6881/udp"
    volumes:
      - ${DOWNLOADS_PATH:-/srv/dev-disk-by-uuid-a5b4e34c-5e9b-430c-93ad-0473fe6143d2/data/Downloads}:/downloads
      - ./data/qbittorrent:/config
    networks:
      - eyedpelis-net

  prowlarr-config:
    image: alpine:3.20
    container_name: eyedpelis-prowlarr-config
    restart: "no"
    volumes:
      - ./data/prowlarr:/config
      - ./docker/prowlarr-init.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "/init.sh"]
    networks:
      - eyedpelis-net

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: eyedpelis-prowlarr
    restart: unless-stopped
    depends_on:
      prowlarr-config:
        condition: service_completed_successfully
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Madrid}
    ports:
      - "${PROWLARR_HOST_PORT:-19696}:9696"
    volumes:
      - ./data/prowlarr:/config
    networks:
      - eyedpelis-net

  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: eyedpelis-jackett
    restart: unless-stopped
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Europe/Madrid}
    ports:
      - "${JACKETT_HOST_PORT:-19117}:9117"
    volumes:
      - ./data/jackett:/config
    networks:
      - eyedpelis-net

  flaresolverr:
    image: flaresolverr/flaresolverr:latest
    container_name: eyedpelis-flaresolverr
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ:-Europe/Madrid}
    ports:
      - "${FLARESOLVERR_HOST_PORT:-18191}:8191"
    networks:
      - eyedpelis-net

networks:
  eyedpelis-net:
    driver: bridge
