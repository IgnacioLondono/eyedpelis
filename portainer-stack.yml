# Stack manual en /opt/eyedpelis — preferir Git + docker-compose.yml en Portainer

services:
  eyedpelis:
    build:
      context: /opt/eyedpelis
      dockerfile: Dockerfile
    container_name: eyedpelis
    restart: unless-stopped
    depends_on:
      - qbittorrent
      - prowlarr
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      MEDIA_PATH: "/media"
      MOVIES_PATH: "Peliculas"
      SERIES_PATH: "Series"
      MEDIA_READ_ONLY: "false"
      TMDB_API_KEY: "${TMDB_API_KEY:-}"
      JWT_SECRET: "${JWT_SECRET:-cambia-este-secreto-en-produccion}"
      ADMIN_USER: "${ADMIN_USER:-eyedpelis}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-Eyedpelis2026!}"
      AUTH_ENABLED: "true"
      CLIENT_URL: "${CLIENT_URL:-https://eyedmovies.eyedcomun.me}"
      QBITTORRENT_URL: "http://qbittorrent:8080"
      QBITTORRENT_USER: "${QBITTORRENT_USER:-admin}"
      QBITTORRENT_PASS: "${QBITTORRENT_PASS:-adminadmin}"
      PROWLARR_URL: "http://prowlarr:9696"
      PROWLARR_API_KEY: "${PROWLARR_API_KEY:-}"
      JACKETT_URL: "http://jackett:9117"
      JACKETT_API_KEY: "${JACKETT_API_KEY:-}"
    volumes:
      - /srv/dev-disk-by-uuid-a5b4e34c-5e9b-430c-93ad-0473fe6143d2/data/Videos:/media
      - /srv/dev-disk-by-uuid-a5b4e34c-5e9b-430c-93ad-0473fe6143d2/data/Downloads:/downloads
      - /opt/eyedpelis/data:/app/server/data
    networks:
      - eyedpelis-net

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: eyedpelis-qbittorrent
    restart: unless-stopped
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "Europe/Madrid"
      WEBUI_PORT: "8080"
      TORRENTING_PORT: "6881"
    ports:
      - "8787:8080"
      - "6881:6881"
      - "6881:6881/udp"
    volumes:
      - /srv/dev-disk-by-uuid-a5b4e34c-5e9b-430c-93ad-0473fe6143d2/data/Downloads:/downloads
      - /opt/eyedpelis/data/qbittorrent:/config
    networks:
      - eyedpelis-net

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: eyedpelis-prowlarr
    restart: unless-stopped
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "Europe/Madrid"
    ports:
      - "9696:9696"
    volumes:
      - /opt/eyedpelis/data/prowlarr:/config
    networks:
      - eyedpelis-net

  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: eyedpelis-jackett
    restart: unless-stopped
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "Europe/Madrid"
    ports:
      - "9117:9117"
    volumes:
      - /opt/eyedpelis/data/jackett:/config
    networks:
      - eyedpelis-net

  flaresolverr:
    image: flaresolverr/flaresolverr:latest
    container_name: eyedpelis-flaresolverr
    restart: unless-stopped
    environment:
      LOG_LEVEL: "info"
      TZ: "Europe/Madrid"
    ports:
      - "8191:8191"
    networks:
      - eyedpelis-net

networks:
  eyedpelis-net:
    driver: bridge
