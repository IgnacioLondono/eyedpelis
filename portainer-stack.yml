# ============================================================
# EYEDPELIS — Solo instalación manual en /opt/eyedpelis
# Si usas Portainer + Git → docker-compose.yml del repo
# qBittorrent: usa el existente del stack "jellyfinn"
# ============================================================

services:
  eyedpelis:
    build:
      context: /opt/eyedpelis
      dockerfile: Dockerfile
    container_name: eyedpelis
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      MEDIA_PATH: "/media"
      MOVIES_PATH: "Peliculas"
      SERIES_PATH: "Series"
      MEDIA_READ_ONLY: "false"
      TMDB_API_KEY: "PEGA_TU_API_KEY_AQUI"
      JWT_SECRET: "cambia-este-secreto-por-algo-largo-y-aleatorio"
      ADMIN_USER: "eyedpelis"
      ADMIN_PASSWORD: "Eyedpelis2026!"
      AUTH_ENABLED: "true"
      CLIENT_URL: "http://192.168.50.197:3001"
    volumes:
      - /srv/dev-disk-by-uuid-a5b4e34c-5e9b-430c-93ad-0473fe6143d2/data/Videos:/media
      - /srv/dev-disk-by-uuid-a5b4e34c-5e9b-430c-93ad-0473fe6143d2/data/Downloads:/downloads
      - /opt/eyedpelis/data:/app/server/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - eyedpelis-net
      - jellyfinn_default

networks:
  eyedpelis-net:
    driver: bridge
  jellyfinn_default:
    external: true
